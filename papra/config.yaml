name: "Papra"
version: "26.6.0-11"
slug: "papra"
description: "Selbst gehostetes Dokumenten- und Rechnungsarchiv (Papra) mit OCR"
url: "https://github.com/papra-hq/papra"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ingress: false
panel_icon: mdi:file-document-multiple
webui: "http://[HOST]:[PORT:1221]/"
ports:
  1221/tcp: 1221
ports_description:
  1221/tcp: "Papra Web-Oberfläche"
map:
  - share:rw
  - addon_config:rw
options:
  auth_secret: ""
  app_base_url: ""
  trust_proxy: true
  document_storage_path: ""
  ai_is_enabled: false
  ai_provider: ""
  ai_api_key: ""
  ai_base_url: ""
  ai_default_model: ""
  ai_auto_tagging_enabled: false
schema:
  auth_secret: password
  app_base_url: str
  trust_proxy: bool
  # Optionaler Unterordner in der HA-Freigabe "share" (z.B. deine per SMB/NFS
  # eingebundene Synology-Freigabe), in dem Papra die Dokumente ablegt.
  # Leer lassen = Dokumente bleiben lokal im Add-on-Datenordner.
  document_storage_path: str?
  # Master-Schalter fuer alle KI-Funktionen (z.B. automatisches Tagging).
  ai_is_enabled: bool
  # Werte: openai, anthropic, mistral, deepseek, openrouter, cocore, ollama,
  # lmstudio oder vllm. Wird beim Start in run.sh geprueft (klare
  # Fehlermeldung bei Tippfehlern) - bewusst kein "list(...)"-Schema, da HA
  # sonst schon einen leeren Standardwert als ungueltig ablehnt.
  ai_provider: str?
  ai_api_key: password?
  # Nur noetig, wenn du einen abweichenden/eigenen Endpoint ansprichst
  # (z.B. eigener Ollama-Host, LM Studio, oder ein OpenAI-kompatibler Proxy).
  ai_base_url: str?
  # Format: <adapter>://<model_name>, z.B. openai://gpt-4o-mini,
  # anthropic://claude-haiku-4-5, ollama://qwen3:8b. Nutzt du Requesty/
  # OpenRouter als Proxy: Adapter bleibt "openai", danach die volle
  # Requesty/OpenRouter-Modell-ID, z.B. openai://openai/gpt-4o-mini.
  ai_default_model: str?
  # Server-seitiger Master-Schalter fuer Auto-Tagging (AUTO_TAGGING_ENABLED).
  # Ohne diesen bleibt die "Auto Tagging"-Einstellungsseite pro Organisation
  # in Papra ausgegraut/unwirksam, selbst wenn ai_is_enabled aktiv ist.
  ai_auto_tagging_enabled: bool
